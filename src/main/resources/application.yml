spring:
  application:
    name: ai-article-writer
  profiles:
    active: local
  # Session configuration
  session:
    store-type: redis
    # Session expires in 30 days
    timeout: 2592000
  # MySQL database configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_article_writer
    username: root
    password: ${MYSQL_PASSWORD:}
  # Redis configuration
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false
server:
  port: 8567
  servlet:
    context-path: /api
    # Cookie expires in 30 days
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi settings
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.nuist.aiarticlewriter.controller
# knife4j settings
knife4j:
  enable: true
  setting:
    language: en

# AI model configuration
# Fill these values with environment variables before running AI integration tests.
langchain4j:
  open-ai:
    chat-model:
      api-key: ${AI_MODEL_API_KEY:}
      base-url: ${AI_MODEL_BASE_URL:https://api.openai.com/v1}
      model-name: ${AI_MODEL_NAME:gpt-4o-mini}
      temperature: 0.7
      timeout: 60s
      max-retries: 2
    streaming-chat-model:
      api-key: ${AI_MODEL_API_KEY:}
      base-url: ${AI_MODEL_BASE_URL:https://api.openai.com/v1}
      model-name: ${AI_MODEL_NAME:gpt-4o-mini}
      temperature: 0.7
      timeout: 60s
      max-retries: 2

# Image search configuration
image-search:
  pexels:
    api-key: ${PEXELS_API_KEY:}

# Image storage configuration
image-storage:
  cos:
    enabled: ${COS_ENABLED:false}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:}
    bucket-name: ${COS_BUCKET_NAME:}
    domain: ${COS_DOMAIN:}

# Mermaid CLI rendering configuration
mermaid:
  cli-command: ${MERMAID_CLI_COMMAND:mmdc}
  background-color: ${MERMAID_BACKGROUND_COLOR:transparent}
  output-format: ${MERMAID_OUTPUT_FORMAT:svg}
  width: ${MERMAID_WIDTH:1200}
  timeout: ${MERMAID_TIMEOUT:30000}

# Meme image search configuration
emoji-pack:
  search-url: ${EMOJI_PACK_SEARCH_URL:https://cn.bing.com/images/async}
  suffix: ${EMOJI_PACK_SUFFIX:表情包}
  timeout: ${EMOJI_PACK_TIMEOUT:10000}
  blocked-domains:
    - tumblr.com
    - pinterest.com
    - pinimg.com
    - facebook.com
    - instagram.com
    - twitter.com
    - x.com

# SVG conceptual diagram generation configuration
svg-diagram:
  default-width: ${SVG_DIAGRAM_DEFAULT_WIDTH:1200}
  default-height: ${SVG_DIAGRAM_DEFAULT_HEIGHT:675}
  folder: ${SVG_DIAGRAM_FOLDER:svg-diagrams}
